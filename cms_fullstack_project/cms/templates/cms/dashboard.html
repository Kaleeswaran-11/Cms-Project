{% extends 'cms/base.html' %}
{% block content %}
<h2>Dashboard</h2>
<a href="{% url 'create_post' %}" class="btn btn-primary">New</a>
<table class="table">
<tr><th>Title</th><th>Action</th></tr>
{% for p in posts %}
<tr>
<td>{{ p.title }}</td>
<td>
<a href="{% url 'update_post' p.id %}">Edit</a>
<a href="{% url 'delete_post' p.id %}">Delete</a>
</td>
</tr>
{% endfor %}
</table>
{% endblock %}
